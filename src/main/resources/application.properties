spring.application.name=GreenyBackend

server.port=8080

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=40MB
greeny.images.max-file-size-bytes=10485760

spring.datasource.url = jdbc:mysql://localhost:3306/Greeny
spring.datasource.username = root
spring.datasource.password = 



spring.jpa.hibernate.ddl-auto = update


spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.enable_lazy_load_no_trans = true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.profiles.active=uat

greeny.auth.email-verification-expiration-minutes=3
greeny.auth.delete-account-expiration-minutes=3
greeny.auth.cookie-max-age-seconds=259200
greeny.auth.cookie-secure=false
greeny.auth.cookie-same-site=Lax
greeny.auth.token-signing-secret=greeny-local-signing-secret
greeny.auth.backend-base-url=http://localhost:8080
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=irohasakayori8000@gmail.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

greeny.ai.provider=gemini
greeny.ai.model=gemini-2.5-flash-lite
greeny.ai.provider-order=gemini,chatgpt
greeny.ai.http.enabled=false
greeny.ai.spring.enabled=true
spring.ai.model.chat=none

greeny.ai.api-key=
greeny.ai.gemini-api-key=
greeny.ai.chatgpt-api-key=

greeny.ai.gemini-model=gemini-2.5-flash-lite
greeny.ai.chatgpt-model=gpt-4o-mini

greeny.ai.gemini-endpoint=https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent
greeny.ai.chatgpt-endpoint=https://api.openai.com/v1/chat/completions
greeny.ai.gemini-search-grounding-enabled=true
greeny.ai.billing-guard-enabled=true
greeny.ai.app-daily-request-limit=200
greeny.ai.app-daily-token-limit=120000
greeny.ai.gemini-free-rpm=15
greeny.ai.gemini-free-tpm=250000
greeny.ai.gemini-free-rpd=1000
greeny.ai.gemini-search-free-rpd=500
greeny.ai.temperature=0.2
greeny.ai.max-tokens=700
greeny.ai.timeout-seconds=45
greeny.ai.allow-paid-models=false
